<!DOCTYPE html>
<script src="https://aeoq.github.io/knob.mjs" type="module"></script>
<link rel="stylesheet" href="./storm.css">
<figure>
    <b style="--t: 70deg">⏫</b>
    <b style="--t: 160deg">⏬</b>
    <b style="--t: -20deg">🔼</b>
    <b style="--t: 250deg">🔽</b>
    <div id="north"></div><div id="south"></div>
    <svg viewBox="17.302 109.174 10 10">
        <marker id="point" viewBox="-1 -1 2 2"><circle cx="0" cy="0" r=".5"/></marker>
        <circle/><text x="22.302" y="113.724">50</text>
        <circle/><text x="22.302" y="113.274">100</text>
        <circle/><text x="22.302" y="112.374">200</text>
        <circle/><text x="22.302" y="111.474">300</text>
        <circle/><text x="22.302" y="110.574">400</text>
        <circle/><text x="22.302" y="109.674">500</text>
    </svg>
</figure>
<form>
    <fieldset>
        <drag-knob range="0/45/5" value="10" name="rotate" title="rotate"></drag-knob>
        <drag-knob range="-15/15/5/°" value="0" name="E" title="E"><output class="center"></output></drag-knob>
        <drag-knob range="-15/15/5/°" value="0" name="S" title="S"><output class="center"></output></drag-knob>
        <drag-knob range="-15/15/5/°" value="0" name="W" title="W"><output class="center"></output></drag-knob><br>
        <drag-knob range="1.01/1.5/.01" class="fine" value="1.11" title="區CPA除總CPA比" name="ratio"></drag-knob>
        <drag-knob range="50/150/5/ km" value="150" title="南掠烈風必然距離" name="south"></drag-knob>
        <drag-knob range="50/150/5/ km" value="75" title="北掠烈風必然距離" name="north"></drag-knob>
    </fieldset>
    <textarea></textarea>
</form>
<table></table>

<script type="module">
    import {A,E,O,Q} from 'https://aeoq.github.io/AEOQ.mjs'
    let data, init, form = Q('form'), fig = E(Q('figure'));
    Q('textarea').value = localStorage.getItem('current') || '';
    form.oninput = ev => {
        if (ev?.target.tagName == 'TEXTAREA') {
            localStorage.setItem('current', ev.target.value);
            Q('svg>path:not([id])')?.remove();
            let points = ev.target.value.split('\n').filter(row => /^[.\d]+ [.\d]+$/.test(row)).map(row => row.split(' '));
            form.title = filter(classify(points, getBearings()));
            return Q('svg').append(E('path.showing', {d: `M${points.join('L')}`}));
        }
        [...new FormData(form)].forEach(([n, v]) => fig.set({[`--${n}`]: v}));
        let bearings = getBearings();
        bearings.each(([dir, [from, to]]) => 
            form[dir[0]] && (form[dir[0]].Q('output').value = to - from < 0 ? to - from + 360 : to - from)
        );
        let result = data?.map(([tc, points]) => [tc, filter(classify(points, bearings))]);
        init ??= result;
        result && Q('table').replaceChildren(...[...result]
            .sort(([, quad1], [, quad2]) => quad1 > quad2 ? 1 : quad1 < quad2 ? -1 : 0)
            .map(([tc, quads]) => 
                E('tr', [E('td', tc), E('td', quads)], {
                    onclick: ev => {
                        ev.target.closest('tr').classList.toggle('showing');
                        Q(`[id='${tc}']`).classList.toggle('showing');
                    },
                    classList: Q(`[id='${tc}'].showing`) ? 'showing' : '',
                    ...quads != init[tc] ? {style: {color: 'yellow'}} : {}
                })
            )
        );
    }
    fetch('./ilens.json').then(resp => resp.json()).then(d => {
        data = new O(d);
        data.each(([tc, points]) => Q('svg').append(
            E('path', {d: `M${points.join('L')}`, id: tc}),
        ));
    }).finally(() => Q('form').oninput());

    let getBearings = () => {
        let {'--rotate': r, ...param} = fig.get('--rotate', '--E', '--S', '--W');
        return new O({
            East:  [              45-r, form.E.value+135-r],
            South: [form.E.value+135-r, form.S.value+225-r],
            West:  [form.S.value+225-r, form.W.value+315-r],
            North: [form.W.value+315-r,               45-r]
        });
    }
    let filter = report => {
        let cpa = Math.min(...[...report.values()].map(km => Math.round(km ?? 999)));
        let filtered = report.filter(([dir, km]) => km && (km <= form.south.value || km / cpa < form.ratio.value));
        filtered.North && (filtered = filtered.filter(([dir, km]) => km && (km <= form.north.value || km / cpa < form.ratio.value)));
        return [...filtered.keys().map(q => ({E: '🔼', S: '⏫', N: '🔽', W: '⏬'})[q[0]])].join('');
    }
    let classify = (points, bearings) => {
        let R = 6371;
        let output = { North: [], South: [], East: [], West: [] };
        
        let toRadians = deg => deg * Math.PI / 180;
        let hko = [22.302, 114.174].map(toRadians);
        let cpa = 800;
        points.forEach(point => {
            point = point.map(toRadians);
            let diff = [point[0] - hko[0], point[1] - hko[1]];

            let a = Math.sin(diff[0] / 2) ** 2 + Math.cos(hko[0]) * Math.cos(point[0]) * Math.sin(diff[1] / 2) ** 2;
            let c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            let km = Math.round(R * c);
            km < cpa && (cpa = km);

            let y = Math.sin(diff[1]) * Math.cos(point[0]);
            let x = Math.cos(hko[0]) * Math.sin(point[0]) - Math.sin(hko[0]) * Math.cos(point[0]) * Math.cos(diff[1]);
            let bearing = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
            let dir = bearings.find(([dir, [from, to]]) => bearing < to && bearing >= from)?.[0] ?? 'North';
            output[dir].push(km);
        });
        return new O(output).map(([quad, dists]) => [quad, Math.min(...dists)]);
    }
</script>
