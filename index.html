<!DOCTYPE html>
<script src="https://aeoq.github.io/knob.mjs" type="module"></script>
<link rel="stylesheet" href="./storm.css">
<figure>
    <b style="--t: 70deg">⏫</b>
    <b style="--t: 160deg">⏬</b>
    <b style="--t: -20deg">🔼</b>
    <b style="--t: 250deg">🔽</b>
    <div id="north"></div><div id="south"></div>
    <svg viewBox="17.302 109.174 10 10">
        <marker id="point" viewBox="-1 -1 2 2"><circle cx="0" cy="0" r=".5"/></marker>
        <circle/><text x="22.302" y="113.724">50</text>
        <circle/><text x="22.302" y="113.274">100</text>
        <circle/><text x="22.302" y="112.374">200</text>
        <circle/><text x="22.302" y="111.474">300</text>
        <circle/><text x="22.302" y="110.574">400</text>
        <circle/><text x="22.302" y="109.674">500</text>
    </svg>
</figure>
<form>
    <fieldset>
        <drag-knob range="-15/35/5" value="10" name="rotate" title="rotate"></drag-knob>
        <drag-knob range="-15/15/5/°" value="0" name="E" title="🔼"><output class="center"></output></drag-knob>
        <drag-knob range="-15/15/5/°" value="0" name="S" title="⏫"><output class="center"></output></drag-knob>
        <drag-knob range="-15/15/5/°" value="0" name="W" title="⏬"><output class="center"></output></drag-knob><br>
        <drag-knob range="1.01/1.5/.01" class="fine" value="1.11" title="區CPA除總CPA比" name="ratio"><i>≤</i></drag-knob>
        或
        <drag-knob range="50/150/5/ km" value="150" title="⏫⏬距離" name="south"><i>≤</i></drag-knob>
        <drag-knob range="50/150/5/ km" value="75" title="🔼🔽距離" name="north"><i>≤</i></drag-knob>
    </fieldset>
    <output name="signals"></output>
    <textarea name="current"></textarea>
</form>
<table></table>

<script type="module">
    import {A,E,O,Q} from 'https://aeoq.github.io/AEOQ.mjs'
    let data = {}, form = Q('form'), fig = E(Q('figure'));
    let signals = {E: '🔼', S: '⏫', W: '⏬', N: '🔽'};
    Q('textarea').value = localStorage.getItem('current') || '';
    form.oninput = ev => {
        if (!data.points) return;
        let bearings = getBearings();
        if (ev?.target.tagName == 'TEXTAREA') {
            localStorage.setItem('current', ev.target.value);
            Q('svg>path:not([id])')?.remove();
            let points = ev.target.value.split('\n').filter(row => /^[.\d]+ [.\d]+$/.test(row))
                .map(row => row.split(' ')).map(([x, y]) => [
                    x.includes('.') ? x : x.replace(/(?<=^\d{2})/, '.'),
                    y.includes('.') ? y : y.replace(/(?<=^\d{3})/, '.')
                ]);
            Q('svg').append(E('path.showing', {d: `M${points.join('L')}`}));
            return form.signals.value = [...putQuadrants(calculate(points), bearings)].map(q => signals[q]).join('');
        }
        [...new FormData(form)].forEach(([n, v]) => fig.set({[`--${n}`]: v}));
        bearings.each(([dir, [from, to]]) => 
            form[dir] && (form[dir].Q('output').value = to - from < 0 ? to - from + 360 : to - from)
        );
        let report = data.points?.map(([storm, points]) => [storm, putQuadrants(points, bearings)]);
        data.initialPredicted ??= report;
        report && Q('table').replaceChildren(...[...report]
            .sort(([, sig1], [, sig2]) => sig1 > sig2 ? 1 : sig1 < sig2 ? -1 : 0)
            .map(([storm, quads]) => {
                let actual = data.actualSignals[storm], error = false;
                /\/$/.test(actual) && ([error, actual] = [true, actual.replace('/', '')]);
                let tr = E('tr', {classList: [
                    Q(`[id='${storm}'].showing`) ? 'showing' : '',
                    quads != data.initialPredicted[storm] ? 'changed' : '',
                    quads != actual ? 'deviated' : '',
                ]});
                return E(tr).set([
                    E('td', storm), 
                    E('td', [...quads].map(q => signals[q])),
                    E('td', {classList: error ? 'error' : ''}, actual && tr.matches('.deviated') ? [...actual].map(q => signals[q]) : '')
                ]);
            })
        );
        console.log(Q('td:last-child:not(:empty)', []).length)
    }
    Q('table').onclick = ev => {
        let tr = ev.target.closest('tr');
        tr && [tr, Q(`[id='${tr.firstChild.innerText}']`)].forEach(el => el.classList.toggle('showing'));
    }
    Promise.all([fetch('./ilens.json'), fetch('./actual.json')])
    .then(resps => Promise.all(resps.map(r => r.json())))
    .then(([points, actual]) => {
        data.actualSignals = actual;
        data.points = new O(points);
        data.points.each(([storm, points]) => {
            calculate(points);
            Q('svg').append(E(`path#${storm}`, {d: `M${points.join('L')}`}));
        });
        form.current.value = localStorage.getItem('current') || '';
        form.current.value && form.current.dispatchEvent(new InputEvent('input', {bubbles: true}));
        form.oninput();
    });
    let calculate = points => {
        let R = 6371;
        let toRadians = deg => deg * Math.PI / 180;
        let hko = [22.302, 114.174].map(toRadians);
        points.forEach((point, i) => {
            point = point.map(toRadians);
            let diff = [point[0] - hko[0], point[1] - hko[1]];
            let a = Math.sin(diff[0] / 2) ** 2 + Math.cos(hko[0]) * Math.cos(point[0]) * Math.sin(diff[1] / 2) ** 2;
            let c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            let y = Math.sin(diff[1]) * Math.cos(point[0]);
            let x = Math.cos(hko[0]) * Math.sin(point[0]) - Math.sin(hko[0]) * Math.cos(point[0]) * Math.cos(diff[1]);
            Object.assign(points[i], {
                bearing: (Math.atan2(y, x) * 180 / Math.PI + 360) % 360, 
                distance: Math.round(R * c)
            });
        });
        return points;
    }
    let getBearings = (r = form.rotate.value) => new O({
        E: [              45-r, form.E.value+135-r],
        S: [form.E.value+135-r, form.S.value+225-r],
        W: [form.S.value+225-r, form.W.value+315-r],
        N: [form.W.value+315-r,               45-r]
    });
    let putQuadrants = (points, quadrants) => {
        let CPAs = { E: 800, S: 800, N: 800, W: 800 };
        points.forEach(({distance, bearing}) => {
            let quad = quadrants.find(([dir, [from, to]]) => bearing < to && bearing >= from)?.[0] ?? 'N';
            distance < CPAs[quad] && (CPAs[quad] = distance);
        });
        let cpa = Math.min(...Object.values(CPAs));
        CPAs = new O(CPAs).filter(([quad, km]) => 
            km / cpa < form.ratio.value ||
            (['E','N'].includes(quad) || CPAs.N < 800 && quad == 'W' ? km <= form.north.value : km <= form.south.value)
        );
        return [...CPAs.keys()].join('');
    }
</script>
